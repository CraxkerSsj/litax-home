<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Base Veneka de Litax</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Open+Sans&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #61267A;
  --card: #151533;
  --text: #eaeaff;
  --accent: #7a6cff;
  --accent2: #ff4d6d;
}

.light {
  --bg: #94A8FF;
  --card: #ffffff;
  --text: #111;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: 'Montserrat', sans-serif;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 20px;
}

h1 {
  text-align: center;
}

.card {
  background: var(--card);
  border-radius: 16px;
  padding: 20px;
  margin-bottom: 20px;
}

.btn {
  display: inline-block;
  padding: 10px 15px;
  border-radius: 12px;
  background: var(--accent);
  color: white;
  margin: 5px;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.05);
}

.toggle {
  position: fixed;
  top: 10px;
  right: 10px;
  cursor: pointer;
}

#subCount {
  font-size: 40px;
  text-align: center;
  color: var(--accent2);
}
</style>
</head>

<body>

<div class="toggle" onclick="toggleTheme()">🌙</div>

<div class="container">

<h1>Base Veneka</h1>

<div class="card">
  <h2>Redes</h2>
  <a class="btn" href="https://youtube.com/@litaxvnz" target="_blank">YouTube</a>
  <a class="btn" href="https://www.twitch.tv/litaxvt" target="_blank">Twitch</a>
  <a class="btn" href="https://TU_BLOG.blogspot.com">Blog</a>
</div>

<div class="card">
  <h2>Suscriptores</h2>
  <h1 id="subCount">--</h1>
</div>

<div class="card">
  <h2>Último video</h2>
  <iframe id="ytVideo" width="100%" height="315" allowfullscreen></iframe>
</div>

<div class="card">
  <h2>En vivo</h2>
  <iframe id="twitchFrame" height="400" width="100%"></iframe>
</div>

</div>

<script>
function toggleTheme() {
  document.body.classList.toggle("light");
}

const channelID = "UC2dwyoEYWTsuUprHKU30s4g";

/* =========================
   FIX VIDEO (RSS REAL)
========================= */
fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://www.youtube.com/feeds/videos.xml?channel_id=${channelID}`)
.then(res => res.json())
.then(data => {
  const videoId = data.items[0].link.split("v=")[1];
  document.getElementById("ytVideo").src =
    "https://www.youtube.com/embed/" + videoId;
})
.catch(() => {
  document.getElementById("ytVideo").src =
    "https://www.youtube.com/embed/videoseries?list=UU2dwyoEYWTsuUprHKU30s4g";
});

/* =========================
   FIX SUBS (MEJORADO)
========================= */
async function getSubs() {
  try {
    const res = await fetch(`https://api.socialcounts.org/youtube-live-subscriber-count/${channelID}`);
    const data = await res.json();

    if(data.est_sub_count){
      document.getElementById("subCount").innerText =
        data.est_sub_count.toLocaleString();
    } else {
      throw "fail";
    }

  } catch {
    document.getElementById("subCount").innerText = "???";
  }
}

getSubs();
setInterval(getSubs, 15000);

/* =========================
   TWITCH AUTO FIX
========================= */
const channel = "litaxvt";
const parent = window.location.hostname;

document.getElementById("twitchFrame").src =
`https://player.twitch.tv/?channel=${channel}&parent=${parent}`;
</script>

</body>
</html>
